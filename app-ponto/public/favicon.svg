<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo do ícone (Padrão Arredondado de App) -->
  <rect width="512" height="512" rx="112" fill="#0f172a" />

  <!-- Sombra para dar profundidade -->
  <path d="M256 128 L373.7 196 V332 L256 400 L138.3 332 V196 Z" fill="#000000" opacity="0.3" filter="blur(8px)" />

  <!-- Hexágono Principal (Verde Esmeralda do seu logo) -->
